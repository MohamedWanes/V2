name: 04 Deploy from ECR

on:
  workflow_run:
    workflows: ["03 Build & Push to ECR"]
    types: [completed]

env:
  IMAGE_NAME: tiny-health-app
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get image tag from build
        id: tag
        run: |
          TAG="${{ github.event.workflow_run.head_sha }}"
          TAG="${TAG::7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Pull image from ECR
        run: |
          docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ steps.tag.outputs.tag }}

      - name: Run container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            -p $APP_PORT:8000 \
            $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ steps.tag.outputs.tag }}

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            curl --fail http://127.0.0.1:$APP_PORT/health && exit 0
            sleep 2
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f $CONTAINER_NAME || true